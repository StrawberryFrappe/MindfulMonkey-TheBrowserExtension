name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Extension Zip
        run: |
          zip -r mindful-monkey.zip . -x "*.git*" "*.github*" "*.md" ".gitignore" "implementation_plan.md"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mindful-monkey.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
